# ==============================================================================
# Smart Cargo Monitoring Integration Stack
# Services: backend + frontend only (EMQX Serverless remains external)
# Canonical env source for compose substitution: repository root .env
# ==============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-cargo-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 5000
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      JWT_ISSUER: ${JWT_ISSUER:-smart-cargo-backend}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-smart-cargo-api}

      DATABASE_URL: ${DATABASE_URL:-}
      PGHOST: ${PGHOST:-}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-}
      PGPASSWORD: ${PGPASSWORD:-}
      PGDATABASE: ${PGDATABASE:-}
      PGPOOL_MAX: ${PGPOOL_MAX:-20}
      PG_IDLE_TIMEOUT_MS: ${PG_IDLE_TIMEOUT_MS:-30000}
      PG_CONNECT_TIMEOUT_MS: ${PG_CONNECT_TIMEOUT_MS:-15000}
      DB_SSL: ${DB_SSL:-false}
      DB_SSL_REJECT_UNAUTHORIZED: ${DB_SSL_REJECT_UNAUTHORIZED:-true}
      DB_SSL_CA_PATH: ${DB_SSL_CA_PATH:-}
      RUN_MIGRATIONS_ON_BOOT: ${RUN_MIGRATIONS_ON_BOOT:-false}
      RUN_SEEDS_ON_BOOT: ${RUN_SEEDS_ON_BOOT:-false}

      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-8883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-}
      MQTT_CA_PATH: ${MQTT_CA_PATH:-}
      MQTT_REJECT_UNAUTHORIZED: ${MQTT_REJECT_UNAUTHORIZED:-true}
      MQTT_TOPIC_FILTER: ${MQTT_TOPIC_FILTER:-tenant/+/truck/+/container/+/telemetry}
      MQTT_CLIENT_ID_PREFIX: ${MQTT_CLIENT_ID_PREFIX:-smart-cargo-backend}
      MQTT_CONNECT_TIMEOUT_MS: ${MQTT_CONNECT_TIMEOUT_MS:-30000}
      MQTT_RECONNECT_PERIOD_MS: ${MQTT_RECONNECT_PERIOD_MS:-5000}

      ALERT_HIGH_TEMPERATURE_THRESHOLD_C: ${ALERT_HIGH_TEMPERATURE_THRESHOLD_C:-35}
      ALERT_GAS_SPIKE_THRESHOLD_RAW: ${ALERT_GAS_SPIKE_THRESHOLD_RAW:-1500}
      ALERT_AUTO_RESOLVE_SHOCK: ${ALERT_AUTO_RESOLVE_SHOCK:-false}
      OFFLINE_THRESHOLD_MS: ${OFFLINE_THRESHOLD_MS:-30000}
      OFFLINE_SCAN_INTERVAL_MS: ${OFFLINE_SCAN_INTERVAL_MS:-5000}
      INGEST_QUEUE_CONCURRENCY: ${INGEST_QUEUE_CONCURRENCY:-6}
      INGEST_QUEUE_MAX_BACKLOG: ${INGEST_QUEUE_MAX_BACKLOG:-5000}
      HISTORY_DEFAULT_LIMIT: ${HISTORY_DEFAULT_LIMIT:-240}
      HISTORY_MAX_LIMIT: ${HISTORY_MAX_LIMIT:-2000}
    volumes:
      # Optional EMQX CA certificate mount:
      # Place emqx-ca.crt inside the host folder configured by EMQX_CA_CERT_DIR.
      - type: bind
        source: ${EMQX_CA_CERT_DIR:-./certs}
        target: /run/certs
        read_only: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: smart-cargo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
