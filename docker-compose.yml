# ==============================================================================
# Smart Cargo Monitoring Integration Stack
# Services: backend + frontend only (EMQX Serverless remains external)
# ==============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-cargo-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      MQTT_BROKER_HOST: ${MQTT_BROKER_HOST}
      MQTT_BROKER_PORT: ${MQTT_BROKER_PORT:-8883}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      MQTT_CA_PATH: ${MQTT_CA_PATH:-}
      MQTT_REJECT_UNAUTHORIZED: ${MQTT_REJECT_UNAUTHORIZED:-true}
      MQTT_TOPIC_FILTER: ${MQTT_TOPIC_FILTER:-tenant/+/truck/+/container/+/telemetry}
      MQTT_CLIENT_ID_PREFIX: ${MQTT_CLIENT_ID_PREFIX:-smart-cargo-backend}
      MQTT_CONNECT_TIMEOUT_MS: ${MQTT_CONNECT_TIMEOUT_MS:-30000}
      MQTT_RECONNECT_PERIOD_MS: ${MQTT_RECONNECT_PERIOD_MS:-5000}

      OFFLINE_THRESHOLD_MS: ${OFFLINE_THRESHOLD_MS:-30000}
      OFFLINE_SCAN_INTERVAL_MS: ${OFFLINE_SCAN_INTERVAL_MS:-5000}
    volumes:
      # Optional EMQX CA certificate mount:
      # Place emqx-ca.crt inside the host folder configured by EMQX_CA_CERT_DIR.
      - type: bind
        source: ${EMQX_CA_CERT_DIR:-./certs}
        target: /run/certs
        read_only: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: smart-cargo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
